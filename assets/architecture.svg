<svg width="1100" height="900" viewBox="0 0 1100 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">PageRankPro System Architecture</title>
  <desc id="desc">Architecture diagram showing HTML input flowing through crawling, graph construction, sampling and iteration engines, visualization, and Streamlit dashboard output.</desc>
  <defs>
    <linearGradient id="pageRankGradient" x1="110" y1="80" x2="990" y2="820" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#16A34A"/>
      <stop offset="0.34" stop-color="#FACC15"/>
      <stop offset="0.68" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="softBackground" x1="0" y1="0" x2="1100" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F0FDF4"/>
      <stop offset="0.44" stop-color="#EFF6FF"/>
      <stop offset="1" stop-color="#F5F3FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L11 7L2 12V2Z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 800 34px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 500 17px Arial, sans-serif; fill: #475569; }
      .box-title { font: 800 20px Arial, sans-serif; fill: #111827; }
      .box-subtitle { font: 500 13px Arial, sans-serif; fill: #64748B; }
      .label { font: 700 13px Arial, sans-serif; fill: #334155; }
      .line { stroke: #334155; stroke-width: 3; marker-end: url(#arrow); }
      .join-line { stroke: #334155; stroke-width: 3; }
      .box { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 2; filter: url(#shadow); }
      .accent-green { stroke: #16A34A; }
      .accent-yellow { stroke: #EAB308; }
      .accent-blue { stroke: #2563EB; }
      .accent-purple { stroke: #7C3AED; }
    </style>
  </defs>

  <rect width="1100" height="900" rx="34" fill="url(#softBackground)"/>
  <rect x="34" y="34" width="1032" height="832" rx="28" fill="#FFFFFF" fill-opacity="0.74" stroke="#DCE6F2"/>

  <text x="550" y="82" text-anchor="middle" class="title">PageRankPro System Architecture</text>
  <text x="550" y="112" text-anchor="middle" class="subtitle">From linked HTML pages to explainable PageRank analytics</text>

  <rect x="405" y="145" width="290" height="78" rx="16" class="box accent-green"/>
  <text x="550" y="178" text-anchor="middle" class="box-title">HTML Corpus Input</text>
  <text x="550" y="202" text-anchor="middle" class="box-subtitle">Built-in samples, uploads, manual graph</text>

  <line x1="550" y1="223" x2="550" y2="266" class="line"/>

  <rect x="405" y="266" width="290" height="78" rx="16" class="box accent-blue"/>
  <text x="550" y="299" text-anchor="middle" class="box-title">Corpus Crawler</text>
  <text x="550" y="323" text-anchor="middle" class="box-subtitle">BeautifulSoup link extraction</text>

  <line x1="550" y1="344" x2="550" y2="387" class="line"/>

  <rect x="405" y="387" width="290" height="78" rx="16" class="box accent-purple"/>
  <text x="550" y="420" text-anchor="middle" class="box-title">Directed Web Graph</text>
  <text x="550" y="444" text-anchor="middle" class="box-subtitle">Pages as nodes, links as arrows</text>

  <path d="M550 465V510" class="join-line"/>
  <path d="M550 510H295" class="join-line"/>
  <path d="M550 510H805" class="join-line"/>
  <line x1="295" y1="510" x2="295" y2="548" class="line"/>
  <line x1="805" y1="510" x2="805" y2="548" class="line"/>

  <rect x="150" y="548" width="290" height="78" rx="16" class="box accent-green"/>
  <text x="295" y="581" text-anchor="middle" class="box-title">Sampling Engine</text>
  <text x="295" y="605" text-anchor="middle" class="box-subtitle">Random surfer simulation</text>

  <rect x="660" y="548" width="290" height="78" rx="16" class="box accent-yellow"/>
  <text x="805" y="581" text-anchor="middle" class="box-title">Iteration Engine</text>
  <text x="805" y="605" text-anchor="middle" class="box-subtitle">Repeated updates until stable</text>

  <line x1="295" y1="626" x2="295" y2="669" class="line"/>
  <line x1="805" y1="626" x2="805" y2="669" class="line"/>

  <rect x="150" y="669" width="290" height="78" rx="16" class="box accent-blue"/>
  <text x="295" y="702" text-anchor="middle" class="box-title">Rank Estimation</text>
  <text x="295" y="726" text-anchor="middle" class="box-subtitle">Visit frequency based scores</text>

  <rect x="660" y="669" width="290" height="78" rx="16" class="box accent-purple"/>
  <text x="805" y="702" text-anchor="middle" class="box-title">Rank Convergence</text>
  <text x="805" y="726" text-anchor="middle" class="box-subtitle">Mathematically stable scores</text>

  <path d="M295 747V782" class="join-line"/>
  <path d="M805 747V782" class="join-line"/>
  <path d="M295 782H805" class="join-line"/>
  <line x1="550" y1="782" x2="550" y2="814" class="line"/>

  <rect x="405" y="814" width="290" height="58" rx="16" fill="url(#pageRankGradient)" filter="url(#shadow)"/>
  <text x="550" y="849" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="800" fill="#FFFFFF">Streamlit Dashboard</text>

  <rect x="770" y="142" width="210" height="82" rx="16" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="875" y="171" text-anchor="middle" class="label">Production Layer</text>
  <text x="875" y="195" text-anchor="middle" class="box-subtitle">Docker, CI/CD, logs, tests</text>

  <rect x="120" y="142" width="210" height="82" rx="16" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="225" y="171" text-anchor="middle" class="label">Exports</text>
  <text x="225" y="195" text-anchor="middle" class="box-subtitle">CSV, JSON, PNG reports</text>
</svg>
