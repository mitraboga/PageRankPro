name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .

      - name: Lint
        run: python -m ruff check .

      - name: Unit and integration tests
        run: python -m pytest tests/unit tests/integration

      - name: CLI smoke test
        run: python pagerankpro.py corpus/corpus0 --graph-out reports/ci-corpus0.png

      - name: Install browser runtime
        run: python -m playwright install --with-deps chromium

      - name: End-to-end dashboard tests
        run: python -m pytest tests/e2e

  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t pagerankpro:ci .
